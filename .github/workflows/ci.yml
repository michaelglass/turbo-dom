name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---- Build napi prebuilt binaries across platforms ----
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Linux musl deps
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - run: npm install --ignore-scripts

      - name: Build native addon
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: '*.node'
          if-no-files-found: error

  # ---- Run the full test suite + conformance on Linux ----
  test:
    name: test (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0

      - run: npm install

      - name: Build native addon
        run: npx napi build --platform --release

      - name: Build WASM parser (nodejs + web targets — exercised by parser.test.mjs)
        run: npm run build:wasm:pkg && npm run build:wasm:web

      - name: Rust core tests
        run: cargo test --lib

      - name: JS test suite (unit, conformance gate, differential, gauntlets)
        run: node --test 'test/*.mjs'

      - name: vitest integration (env adapter, React + RTL + user-event)
        run: npm run test:vitest

      - name: jest integration (env adapter, React + RTL)
        run: npm run test:jest

      - name: html5lib conformance report
        run: npm run conformance

  # ---- WASM fallback builds ----
  wasm:
    name: wasm fallback
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --no-default-features --features wasm-bind --target wasm32-unknown-unknown

  # ---- Publish to npm on a version tag ----
  # Single bundled package: all platform *.node binaries ship inside `turbo-dom`
  # (index.js loads the matching local binary). One package to publish — no
  # per-platform sub-packages to create. Requires repository secret NPM_TOKEN
  # (a token allowed to publish the `turbo-dom` package — a Classic Automation
  # token is simplest).
  publish:
    name: publish
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # prepublishOnly rebuilds the native addon AND both WASM targets (pkg/ + pkg-web/),
      # which ship in the package — so the publish runner needs the Rust + wasm toolchain.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
      - run: npm install --ignore-scripts

      - name: Download all prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Bundle binaries into the package root
        run: |
          find artifacts -name '*.node' -exec cp {} . \;
          ls -1 *.node

      - name: Publish turbo-dom
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---- Publish the Rust-native runtime crate to crates.io on a version tag ----
  # The `turbo-dom` crate is the pure-Rust DOM runtime (workspace member crates/turbo-dom),
  # for in-process Rust consumers. Independent of the npm package above; same v* tag fires
  # both. Requires repository secret CARGO_REGISTRY_TOKEN (a crates.io API token allowed to
  # publish the turbo-dom crate). cargo reads CARGO_REGISTRY_TOKEN from the environment natively.
  publish-crate:
    name: publish-crate
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish turbo-dom crate
        run: cargo publish -p turbo-dom
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
